gzip on;
gzip_vary on;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;
gzip_min_length 1024;

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the Node.js server container.
    # A generous read timeout is needed for Puppeteer PDF generation.
    location /api/ {
        proxy_pass         http://server:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering    off;
    }

    # React Router fallback — serve index.html for every non-file path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
