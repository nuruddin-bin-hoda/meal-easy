gzip on;
gzip_vary on;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;
gzip_min_length 1024;

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # 1. API proxy — Puppeteer PDF generation needs a generous read timeout.
    location /api/ {
        proxy_pass         http://server:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering    off;
    }

    # 2. Uploads proxy — must be before the SPA fallback.
    location /uploads/ {
        proxy_pass         http://server:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # 3. SPA fallback — must be last.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
