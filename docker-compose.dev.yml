services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "3000:5001"
    volumes:
      - ./server/src:/app/src
    environment:
      NODE_ENV: development
    command: npm run dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "4000:5173"
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    command: npm run dev -- --host
